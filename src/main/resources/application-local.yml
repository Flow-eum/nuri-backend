spring:
  datasource:
    url: jdbc:h2:mem:test;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update # 기존 유지 및 변경 시 반영
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true # SQL 의미 주석 추가

  h2:
    # 브라우저에서 DB 내용을 볼 수 있는 콘솔 활성화
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.hibernate.sql: debug
    org.hibernate.orm.jdbc.bind: trace # 쿼리의 파라미터 값 확인

jwt:
  secret:
    key: ${JWT_SECRET_KEY}
